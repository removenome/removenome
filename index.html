<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificação de Representante – Remove Nome</title>
<meta name="description" content="Verifique se o representante Remove Nome é autorizado e ativo.">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a3faa;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 3rem;
  }

  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 1.75rem;
  }

  .logo-circle {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 3px solid #F5C200;
    overflow: hidden;
    margin-bottom: 0.75rem;
    background: #1535a0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .logo-text {
    text-align: center;
    line-height: 1;
  }

  .logo-text span {
    display: block;
    font-size: 28px;
    font-weight: 900;
    font-style: italic;
    color: #fff;
    letter-spacing: -0.5px;
  }

  .logo-swoosh {
    width: 80px;
    height: 10px;
    margin: 2px auto 0;
  }

  .tagline {
    color: #F5C200;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .card {
    background: #fff;
    border-radius: 18px;
    padding: 1.75rem 1.5rem;
    width: 100%;
    max-width: 390px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: #1a3faa;
    margin-bottom: 4px;
  }

  .card-sub {
    font-size: 13px;
    color: #888;
    margin-bottom: 1.25rem;
  }

  input[type="text"] {
    width: 100%;
    padding: 13px 14px;
    border: 1.5px solid #d0d5e8;
    border-radius: 10px;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    color: #1a1a2e;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: border-color 0.2s;
    background: #f7f8fc;
  }

  input[type="text"]:focus {
    border-color: #1a3faa;
    background: #fff;
  }

  button.verificar {
    width: 100%;
    margin-top: 0.9rem;
    padding: 14px;
    background: #1a3faa;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.02em;
  }

  button.verificar:hover { background: #1535a0; }
  button.verificar:active { transform: scale(0.98); }
  button.verificar:disabled { background: #8fa3d6; cursor: not-allowed; }

  .loading {
    text-align: center;
    color: #888;
    font-size: 14px;
    padding: 1rem 0 0;
    display: none;
  }

  .error-box {
    background: #fff3f3;
    border: 1px solid #f5c6c6;
    border-radius: 10px;
    padding: 0.9rem 1rem;
    text-align: center;
    color: #b71c1c;
    font-size: 14px;
    margin-top: 1.25rem;
    display: none;
  }

  .result {
    display: none;
    margin-top: 1.5rem;
  }

  .divider {
    border: none;
    border-top: 1px solid #eef0f8;
    margin-bottom: 1.25rem;
  }

  .rep-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 1rem;
  }

  .rep-avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 2.5px solid #F5C200;
    overflow: hidden;
    flex-shrink: 0;
    background: #e8edf8;
  }

  .rep-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  .rep-name {
    font-size: 17px;
    font-weight: 700;
    color: #1a1a2e;
    line-height: 1.3;
  }

  .rep-region {
    font-size: 13px;
    color: #777;
    margin-top: 3px;
  }

  .badge-ativo {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: #e8f5e9;
    color: #1b5e20;
    border: 1px solid #a5d6a7;
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 1.1rem;
  }

  .badge-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #2e7d32;
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    font-size: 14px;
    border-top: 1px solid #f0f1f8;
  }

  .detail-row:first-child { border-top: none; }

  .detail-label { color: #999; }
  .detail-value { font-weight: 600; color: #1a1a2e; }

  .whats-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    width: 100%;
    margin-top: 1.25rem;
    padding: 13px;
    background: #25D366;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s;
  }

  .whats-btn:hover { background: #20b858; }

  .footer {
    margin-top: 2rem;
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    text-align: center;
    line-height: 1.8;
  }
</style>
</head>
<body>

<div class="header">
  <img src="https://raw.githubusercontent.com/removenome/removenome/main/logo.JPG" alt="Remove Nome" style="width:180px; margin-bottom:0.75rem;">
  <p class="tagline">Verificação de Representante</p>
</div>

<div class="card">
  <p class="card-title">Consultar representante</p>
  <p class="card-sub">Digite o código para confirmar a identidade</p>

  <input type="text" id="codigoInput" placeholder="Ex: RN-2026-0001" maxlength="20">
  <button class="verificar" id="verificarBtn" onclick="verificar()">Verificar</button>

  <div class="loading" id="loadingMsg">Consultando base de dados…</div>
  <div class="error-box" id="errorBox"></div>

  <div class="result" id="resultBox">
    <hr class="divider">
    <div class="rep-header">
      <div class="rep-avatar">
        <img src="https://raw.githubusercontent.com/removenome/removenome/main/foto.png" alt="Foto do representante">
      </div>
      <div>
        <div class="rep-name" id="repNome"></div>
        <div class="rep-region" id="repRegiao"></div>
      </div>
    </div>
    <div class="badge-ativo">
      <div class="badge-dot"></div>
      <span id="repMensagem">Representante verificado e ativo.</span>
    </div>
    <div id="repDetalhes"></div>
    <a class="whats-btn" id="repWhats" href="#" target="_blank">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Falar com o representante
    </a>
  </div>
</div>

<div class="footer">
  Remove Nome Assessoria e Consultoria<br>
  CNPJ 62.197.923/0001-32 · Caraguatatuba/SP
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwnIogNpqm_Wj10_aaYSGfRDvLZgQRTrMmSwvhnEOs8LDU8ayBEkNdLses-3bs4JvgY/exec';

async function verificar() {
  const codigo = document.getElementById('codigoInput').value.trim().toUpperCase();
  if (!codigo) { alert('Digite o código do representante.'); return; }

  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('loadingMsg').style.display = 'block';
  document.getElementById('verificarBtn').disabled = true;

  try {
    const res = await fetch(SCRIPT_URL + '?codigo=' + encodeURIComponent(codigo));
    const data = await res.json();

    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('verificarBtn').disabled = false;

    if (data.valido) {
      document.getElementById('repNome').textContent = data.nome || '';
      document.getElementById('repRegiao').textContent = data.regiao || '';
      document.getElementById('repMensagem').textContent = data.mensagem || 'Representante verificado e ativo.';

      let det = '';
      if (data.validade) det += '<div class="detail-row"><span class="detail-label">Validade</span><span class="detail-value">' + data.validade + '</span></div>';
      if (data.whatsapp) det += '<div class="detail-row"><span class="detail-label">WhatsApp</span><span class="detail-value">' + data.whatsapp + '</span></div>';
      document.getElementById('repDetalhes').innerHTML = det;

      if (data.whatsapp) {
        const num = data.whatsapp.replace(/\D/g, '');
        document.getElementById('repWhats').href = 'https://wa.me/55' + num;
        document.getElementById('repWhats').style.display = 'flex';
      } else {
        document.getElementById('repWhats').style.display = 'none';
      }

      document.getElementById('resultBox').style.display = 'block';
    } else {
      const eb = document.getElementById('errorBox');
      eb.textContent = data.mensagem || 'Código não encontrado. Verifique e tente novamente.';
      eb.style.display = 'block';
    }
  } catch (e) {
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('verificarBtn').disabled = false;
    const eb = document.getElementById('errorBox');
    eb.textContent = 'Erro ao consultar. Tente novamente em instantes.';
    eb.style.display = 'block';
  }
}

document.getElementById('codigoInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') verificar();
});

const params = new URLSearchParams(window.location.search);
const codigoUrl = params.get('codigo');
if (codigoUrl) {
  document.getElementById('codigoInput').value = codigoUrl.toUpperCase();
  verificar();
}
</script>
</body>
</html>
